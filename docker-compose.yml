services:
  db:
    image: postgres:16.2
    container_name: family-finance-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: family_finance_db
    ports:
      - "5432:5432"
    volumes:
      - family-finance-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d family_finance_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-finance-app
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=family_finance_db;Username=admin;Password=admin_password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  family-finance-postgres-data:
    name: family-finance-postgres-data
